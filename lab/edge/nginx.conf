# =============================================================================
# Edge proxy for ShopFlux.
#
# Deliberate weaknesses (for the lab):
#   - $host (== Host header) is forwarded blindly => host header attacks
#   - X-Forwarded-Host is appended unfiltered (cache poisoning gadget)
#   - Cache key intentionally excludes some headers that the backend reflects
#   - Permissive CORS preflight handling on /api/public/
#   - .git/ and /backups/ exposed at the web root (information disclosure)
#   - /healthz proxies any URL passed in ?target= (SSRF-by-design from edge)
# =============================================================================

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=shopflux_cache:10m
                 inactive=60m max_size=100m;

server {
    listen 80 default_server;
    server_name _;

    # --- Information disclosure: directory listing on /backups/ ---
    location /backups/ {
        autoindex on;
        alias /usr/share/nginx/html/backups/;
    }

    # Hidden Git directory (.git leak)
    location /.git/ {
        alias /usr/share/nginx/html/.git/;
        autoindex on;
    }

    # An unhealthy "health check" that fetches arbitrary URLs (SSRF gadget)
    location /healthz {
        # Lab-only: proxies whatever target= you give it
        if ($arg_target ~* "^(https?://[^ ]+)$") {
            proxy_pass $arg_target;
            break;
        }
        return 200 "ok\n";
    }

    # Cache poisoning playground: cache key excludes X-Forwarded-Host
    # and the backend reflects that header into a <link rel="canonical">.
    location /static/ {
        proxy_cache shopflux_cache;
        proxy_cache_key "$scheme$host$request_uri";   # <-- ignores headers
        proxy_cache_valid 200 5m;
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://shopflux-web:5000;
    }

    # API surface: very permissive CORS preflight (reflects Origin)
    location /api/ {
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Vary Origin always;
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            return 204;
        }
        proxy_pass http://shopflux-api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Storefront / app
    location / {
        proxy_pass http://shopflux-web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
        proxy_set_header X-Real-IP $remote_addr;

        # Buffering off so chunked smuggling-style payloads pass through.
        proxy_buffering off;
        proxy_http_version 1.1;
    }
}
