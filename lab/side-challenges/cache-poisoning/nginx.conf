user www-data;
worker_processes auto;
events { worker_connections 256; }
http {
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=poison:10m
                     inactive=10m max_size=50m;
    server {
        listen 80;
        # Vulnerable cache key: only method + host + URI.  Headers like
        # X-Forwarded-Host that the backend reflects into HTML are NOT in
        # the key — perfect for unkeyed-input cache poisoning.
        location / {
            proxy_cache poison;
            proxy_cache_key "$request_method$host$request_uri";
            proxy_cache_valid 200 5m;
            proxy_pass http://127.0.0.1:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $http_x_forwarded_host;
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
